name: soultalk_pc
description: "SoulTalk PC — 桌面端，与手机端互联"
publish_to: 'none'

version: 1.0.0

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1

  # WebSocket 客户端
  web_socket_channel: ^3.0.1

  # 网络
  dio: ^5.8.0+1

  # 二维码
  qr_flutter: ^4.1.0

  # 本地 IP
  network_info_plus: ^6.1.3

  # 路由
  go_router: ^14.8.1

  # 持久化
  shared_preferences: ^2.3.5
  sqflite_common_ffi: ^2.3.4+4
  sqlite3_flutter_libs: ^0.5.30
  path: ^1.9.0
  path_provider: ^2.1.5

  # 加密存储
  flutter_secure_storage: ^9.2.4

  # 加密 / 哈希 (用于同步校验)
  crypto: ^3.0.5

  # UUID
  uuid: ^4.5.1

  # JSON
  json_annotation: ^4.9.0

  # 平台信息
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
