name: soultalk
description: "SoulTalk — AI驱动的微信风格社交应用"
publish_to: 'none'

# ── 版本管理 ───────────────────────────────────────────────────────────
# 正式发布通过 GitHub tag （格式 vX.Y.Z）触发 CI/CD 自动更新此字段。
# 本地构建前可运行 scripts/update_version.sh 将版本同步到最近 tag。
# 详见 .github/workflows/release.yml
version: 1.0.0

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 数据模型
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 数据库
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  sqlite3_flutter_libs: ^0.5.30
  path: ^1.9.0
  path_provider: ^2.1.5

  # 网络
  dio: ^5.8.0+1
  shelf: ^1.4.2
  shelf_web_socket: ^2.0.0
  web_socket_channel: ^3.0.1
  network_info_plus: ^6.1.3

  # 二维码
  qr_flutter: ^4.1.0

  # JWT
  dart_jsonwebtoken: ^2.14.2

  # 路由
  go_router: ^14.8.1

  # 持久化
  shared_preferences: ^2.3.5

  # 文件选择
  file_picker: ^8.1.7

  # 图片
  image_picker: ^1.1.2

  # 工具
  uuid: ^4.5.1

  # 加密 (用于PNG角色卡base64解析 + 备份加密)
  crypto: ^3.0.5
  encrypt: ^5.0.3

  # 压缩 / 解压
  archive: ^4.0.2

  # 应用信息
  package_info_plus: ^8.3.0

  # 打开 URL / 文件
  url_launcher: ^6.3.1
  open_filex: ^4.6.0

  # 分享文件
  share_plus: ^10.1.4

  # 音频播放
  just_audio: ^0.9.40

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.15
  freezed: ^2.5.7
  riverpod_generator: ^2.6.1
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/avatars/
